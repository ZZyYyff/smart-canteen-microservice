apiVersion: v1
kind: Service
metadata:
  name: pickup-service
  namespace: smart-canteen
  labels:
    app: pickup-service
spec:
  type: ClusterIP
  ports:
    - port: 9004
      targetPort: 9004
  selector:
    app: pickup-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pickup-service
  namespace: smart-canteen
  labels:
    app: pickup-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pickup-service
  template:
    metadata:
      labels:
        app: pickup-service
    spec:
      containers:
        - name: pickup-service
          image: smart-canteen/pickup-service:latest
          env:
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: root
            - name: REDIS_HOST
              value: redis
            - name: NACOS_SERVER_ADDR
              value: nacos:8848
          ports:
            - containerPort: 9004
          readinessProbe:
            tcpSocket:
              port: 9004
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9004
            initialDelaySeconds: 60
            periodSeconds: 20
